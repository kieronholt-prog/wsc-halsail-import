name: Detect New Entries

on:
  schedule:
    # Daily at 08:00 UTC (09:00 BST / 08:00 GMT)
    - cron: '0 8 * * *'
    # Hourly Wednesday afternoons 12:00-17:00 UTC (13:00-18:00 BST)
    - cron: '0 12-17 * * 3'
    # Hourly Friday afternoons 12:00-17:00 UTC (13:00-18:00 BST)
    - cron: '0 12-17 * * 5'
  # Allow manual trigger from GitHub UI for testing
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run detection
        env:
          HALSAIL_EMAIL: ${{ secrets.HALSAIL_EMAIL }}
          HALSAIL_PASSWORD: ${{ secrets.HALSAIL_PASSWORD }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_WORKER_SECRET: ${{ secrets.CF_WORKER_SECRET }}
        run: node scripts/detect.js
