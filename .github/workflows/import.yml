name: Import New Entries

on:
  # Triggered by the PWA via GitHub Actions API
  repository_dispatch:
    types: [run-import]
  # Allow manual trigger from GitHub UI for testing
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run import
        env:
          HALSAIL_EMAIL: ${{ secrets.HALSAIL_EMAIL }}
          HALSAIL_PASSWORD: ${{ secrets.HALSAIL_PASSWORD }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_WORKER_SECRET: ${{ secrets.CF_WORKER_SECRET }}
        run: node scripts/import.js
